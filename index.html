<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暇つぶしゲーム大全</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <h1>暇つぶし大全</h1>
  <ul class="game-list" id="game-list"></ul>
</div>

<div id="main-content">
  <canvas id="game-canvas"></canvas>
  <div id="ui-panel" class="ui-panel">
    <div id="ui-content"></div>
  </div>
  
  <div id="virtual-controls">
    <div id="v-dpad" class="v-section">
      <button class="v-btn" data-key="ArrowUp" data-code="ArrowUp">↑</button>
      <div class="h-row">
        <button class="v-btn" data-key="ArrowLeft" data-code="ArrowLeft">←</button>
        <button class="v-btn" data-key="ArrowDown" data-code="ArrowDown">↓</button>
        <button class="v-btn" data-key="ArrowRight" data-code="ArrowRight">→</button>
      </div>
    </div>
    
    <div id="v-action" class="v-section">
      <button class="v-btn round" data-key=" " data-code="Space">JUMP</button>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script src="games/dino/dino.js"></script>
<script src="games/tetris/tetris.js"></script>
<script src="app.js"></script>

</body>
</html>
